# ─────────────────────────────────────────────
# SCHEDULE (automated recurring tasks)
# interval_minutes OR run_at (HH:MM daily)
# ─────────────────────────────────────────────
schedule:
  # Full human session — browse feed, explore, reels naturally
  - task:
      action: "watch_feed_stories"
      count: 30
    run_at: "08:30"
    concurrent: true

  # Like hashtag posts every 2 hours
  - task:
      action: "like_hashtag"
      hashtag: "photography"
      count: 20
    interval_minutes: 120
    concurrent: true

  # Auto-reply DMs every 45 minutes
  - task:
      action: "auto_reply_dms"
      reply_map:
        price: "Check our bio link for pricing!"
        _default: "Thanks for reaching out 🙏"
      max_threads: 30
    interval_minutes: 45
    concurrent: true

  # Nightly unfollow cleanup
  - task:
      action: "unfollow_non_followers"
      limit: 30
    run_at: "22:30"
    concurrent: true